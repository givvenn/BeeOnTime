name: Build and Release

on:
  # Manual trigger from the Actions tab
  workflow_dispatch:
  # Build + create a GitHub release when you push a version tag (e.g. v0.1.0)
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest        # Apple Silicon + Intel universal binary
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04        # x86_64 .deb + .AppImage
            args: ''
          - platform: windows-latest      # x86_64 .msi + .exe (NSIS)
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # On macOS, install both arches so we can build a universal binary
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - name: Install frontend dependencies
        run: npm ci || npm install

      - name: Build Tauri app and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Only attach to a release when the workflow runs from a tag push.
          # For workflow_dispatch runs the artifacts are uploaded below instead.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: 'BeeOnTime v__VERSION__'
          releaseBody: |
            ## Downloads

            - **macOS** — `.dmg` (universal binary, runs on Apple Silicon and Intel)
            - **Windows** — `.msi` installer (recommended) or `.exe` (NSIS)
            - **Linux** — `.AppImage` (portable) or `.deb` (Debian/Ubuntu)

            See the assets below.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # When triggered manually (not via tag), tauri-action skips the release.
      # Upload the bundles as workflow artifacts so they can be downloaded
      # from the Actions run page.
      - name: Upload artifacts (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: beeontime-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: ignore
          retention-days: 14
